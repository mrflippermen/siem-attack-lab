# =====================================================================
#  Pipeline Logstash: log CRUDO de Apache -> documento ESTRUCTURADO
#  Anade deteccion de escaneres y de patrones de inyeccion.
# =====================================================================

input {
  beats {
    port => 5044
  }
}

filter {

  # Filebeat inyecta su PROPIA metadata ECS, incluido un objeto 'agent'
  # (datos del agente Filebeat). Hay que eliminarlo ANTES del parseo: si no,
  # colisiona con el campo 'agent' (User-Agent) del grok y rompe el filtro
  # useragent (TypeError: hash -> string), matando el worker del pipeline.
  mutate {
    remove_field => [ "agent", "ecs", "host", "input", "log", "@version", "event" ]
  }

  # ---------- ACCESS LOG (formato combined) ----------
  if [log_type] == "apache_access" {

    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
      # En 8.x el patron tambien existe como HTTPD_COMBINEDLOG:
      # match => { "message" => "%{HTTPD_COMBINEDLOG}" }
    }

    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
    }

    # response llega como string -> lo pasamos a entero para filtrar rangos
    mutate { convert => { "response" => "integer" } }

    # Desglosa el User-Agent (navegador, version, OS...)
    useragent {
      source => "agent"
      target => "ua"
    }

    # GeoIP de la IP de origen (solo IPs publicas; las privadas del lab
    # generarian _geoip_lookup_failure y no aportan geolocalizacion).
    if [clientip] !~ /^(10\.|127\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)/ {
      geoip {
        source => "clientip"
        target => "geo"
      }
    }

    # ------- HEURISTICAS DE DETECCION -------

    # 1) User-Agent de herramienta de ataque conocida
    if [agent] =~ /(?i)(sqlmap|nikto|nmap|masscan|hydra|gobuster|dirbuster|dirb|wpscan|nuclei|acunetix|nessus|wfuzz|ffuf)/ {
      mutate { add_tag => [ "scanner_ua", "suspicious" ] }
    }

    # 2) Firma de inyeccion SQL en la URL/peticion
    if [request] =~ /(?i)(union(\s|%20|\/\*.*\*\/)+select|information_schema|\bor\b\s+1=1|sleep\(|benchmark\(|0x[0-9a-f]{6}|concat\(|--\s|%27|'\s*--)/ {
      mutate { add_tag => [ "sqli_pattern", "suspicious" ] }
    }

    # 3) Path traversal / LFI
    if [request] =~ /(\.\.(\/|%2f)){2,}|\/etc\/passwd|php:\/\/|\bfilter\/|data:\/\// {
      mutate { add_tag => [ "lfi_pattern", "suspicious" ] }
    }

    # 4) Cross-Site Scripting reflejado en la URL
    if [request] =~ /(?i)(<script|%3cscript|onerror=|onload=|javascript:|%3csvg|alert\()/ {
      mutate { add_tag => [ "xss_pattern", "suspicious" ] }
    }

    # 5) Command injection / SSTI
    if [request] =~ /(?i)(;|%3b|\|\||&&|%26%26|\$\{|\{\{|`|%60)(\s|%20)*(id|whoami|cat|curl|wget|nc|bash|sh)\b/ {
      mutate { add_tag => [ "cmdi_pattern", "suspicious" ] }
    }

    # 6) Errores de servidor (500) = posible inyeccion rompiendo SQL
    if [response] >= 500 {
      mutate { add_tag => [ "server_error" ] }
    }
    # 7) Rafaga de 404 = fuerza bruta de directorios
    if [response] == 404 {
      mutate { add_tag => [ "not_found" ] }
    }
    # 8) Login fallido (401 en login.php) = posible fuerza bruta de credenciales
    if [request] =~ /\/login\.php/ and [response] == 401 {
      mutate { add_tag => [ "auth_failed" ] }
    }
  }

  # ---------- ERROR LOG ----------
  if [log_type] == "apache_error" {
    grok {
      match => { "message" => "\[%{HTTPDERROR_DATE:err_time}\] \[%{DATA:module}:%{LOGLEVEL:level}\]( \[pid %{NUMBER:pid}\])?( \[client %{IPORHOST:clientip}(:%{NUMBER}?)\])? %{GREEDYDATA:err_msg}" }
    }
    mutate { add_tag => [ "apache_error" ] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "weblogs-%{+YYYY.MM.dd}"
  }
  # Util para depurar el pipeline (ver docker compose logs logstash):
  # stdout { codec => rubydebug }
}
