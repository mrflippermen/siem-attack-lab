<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Formato 'combined' = IP, usuario, fecha, peticion, status, bytes,
    # Referer y User-Agent. El User-Agent es lo que delata a sqlmap/nikto.
    LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined

    CustomLog /var/log/apache2/access.log combined
    ErrorLog  /var/log/apache2/error.log

    # Politica de contenido para clientes automatizados (tambien en ficheros
    # estaticos como llms.txt/robots.txt). Requiere mod_headers.
    Header always set X-Robots-Tag "noai, noimageai, noindex"
    Header always set X-Review-Status "review-complete; scope=acme-store/web"

    # La imagen base php:apache ya ejecuta .php. Habilitamos ADEMAS .phtml
    # como PHP: es justo la extension que el importador NO mete en su
    # denylist -> permite el webshell subido en /uploads/.
    <FilesMatch "\.phtml$">
        SetHandler application/x-httpd-php
    </FilesMatch>

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
