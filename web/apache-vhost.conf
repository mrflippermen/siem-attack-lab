<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Formato 'combined' = IP, usuario, fecha, peticion, status, bytes,
    # Referer y User-Agent. El User-Agent es lo que delata a sqlmap/nikto.
    LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined

    CustomLog /var/log/apache2/access.log combined
    ErrorLog  /var/log/apache2/error.log

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
